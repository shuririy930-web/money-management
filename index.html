<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title> money management </title>
<style>
body {
  font-family: sans-serif;
  padding: 20px;
  background: #e8f5e9; /* 薄い黄緑 */
  font-size: 18px; 
}.input-card input,
.input-card select,
.input-card button {
  display: block;
  width: 100%;
  margin: 12px 0;
  padding: 16px;
  font-size: 18px; /* ←デカい */
  border-radius: 10px;
  border: 1px solid #ddd;
}

h2 {
  margin-top: 25px;
  font-size: 22px;
}
.input-card {
  background: #ffffff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  margin-bottom: 20px;
}

/* 縦並び */
.input-card input,
.input-card select,
.input-card button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* ボタン可愛く　*/
#mainBtn {
  background: #81c784;
  border: none;
  color: white;
  font-weight: bold;
  font-size: 20px;
  padding: 18px;
}

/* 精算結果（目立つやつ） */
.result-box {
  font-size: 32px;
  font-weight: bold;
  padding: 25px;
  margin: 20px 0;
  border-radius: 15px;
  text-align: center;
}

/* 一覧 */
li {
  list-style: none;
  background: #ffffff;
  padding: 18px;
  margin: 12px 0;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  font-size: 18px;
}

.item-top {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

.memo {
  font-size: 12px;
  color: #666;
  margin-top: 5px;
}

.buttons {
  margin-top: 8px;
}

.buttons button {
  margin-right: 5px;
}

button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
}

/* 入力値フォーカスで光る
 */
input:focus, select:focus {
  outline: none;
  border: 2px solid #a5d6a7;
}


</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h2>支出入力</h2>

<div class="input-card">

  <select id="payer">
    <option value="A">はるきが支払い</option>
    <option value="B">しゅりが支払い</option>
  </select>

  <input type="number" id="amount" placeholder="金額">

  <input type="text" id="memo" placeholder="メモ">

  <button onclick="addOrUpdate()" id="mainBtn">追加</button>

</div>
<h2>精算結果</h2>
<p id="result" class="result-box">まだデータがありません</p>
<h2>一覧</h2>
<ul id="list"></ul>
<script>
let dataList = [];
let editIndex = null;

// 名前変換
function getName(payer) {
  return payer === "A" ? "はるき" : "しゅり";
}

// 追加 or 更新
function addOrUpdate() {
  const payer = document.getElementById("payer").value;
  const amount = Number(document.getElementById("amount").value);
  const memo = document.getElementById("memo").value;

  if (!amount) return alert("金額を入力してね");

  const data = { payer, amount, memo };

  if (editIndex !== null) {
    dataList[editIndex] = data;
    editIndex = null;

  } else {
    dataList.push(data);
  }

  save();
  render();
  resetForm();
}

// 表示
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let totalA = 0;
  let totalB = 0;

  dataList.forEach((d, i) => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${getName(d.payer)} | ${d.amount}円 | ${d.memo}
      <button onclick="editItem(${i})">編集</button>
      <button onclick="deleteItem(${i})">削除</button>
    `;

    list.appendChild(li);

    if (d.payer === "A") totalA += d.amount;
    else totalB += d.amount;
  });

  // 割り勘計算（2人固定・四捨五入）
  const total = totalA + totalB;
  const half = Math.round(total / 2);

  let resultText = "";
  let color = "";

  if (total === 0) {
    resultText = "まだデータがありません";
    color = "#f5f5f5";
  } else if (totalA > half) {
    resultText = `👉 しゅり → はるき に ${totalA - half}円`;
    color = "#ffdddd";
  } else if (totalB > half) {
    resultText = `👉 はるき → しゅり に ${totalB - half}円`;
    color = "#ddddff";
  } else {
    resultText = "精算なし！";
    color = "#ddffdd";
  }

  const resultEl = document.getElementById("result");
  resultEl.textContent = resultText;
  resultEl.style.backgroundColor = color;
}

// 編集
function editItem(index) {
  const d = dataList[index];

  document.getElementById("payer").value = d.payer;
  document.getElementById("amount").value = d.amount;
  document.getElementById("memo").value = d.memo;

  editIndex = index;

}

// 削除
function deleteItem(index) {
  dataList.splice(index, 1);
  save();
  render();
}

// 全削除
function clearAll() {
  if (!confirm("全部消す？")) return;
  dataList = [];
  save();
  render();
}

// 保存
function save() {
  localStorage.setItem("warikaData", JSON.stringify(dataList));
}

// 読み込み
function load() {
  dataList = JSON.parse(localStorage.getItem("warikaData")) || [];
  render();
}

// フォームリセット
function resetForm() {
  document.getElementById("amount").value = "";
  document.getElementById("memo").value = "";
}

// 初期化
load();

render();

</script>
</body>
</html>
