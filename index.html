<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title> money management </title>
<style>
/* =========================
   全体設定
========================= */

/* 幅ズレ防止（超重要） */
* {
  box-sizing: border-box;
}

/* 背景＆ベース文字サイズ */
body {
  font-family: sans-serif;
  padding: 20px;
  background: #e8f5e9; /* パステル黄緑 */
  font-size: 18px; /* 全体大きめ */
}


/* =========================
   見出し
========================= */
h2 {
  margin-top: 25px;
  font-size: 22px;
  text-align: center;
}

ul {
  padding: 0;
  margin: 0;
}

/* =========================
   入力カード
========================= */
.input-card {
  background: #ffffff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1); /* ぷっくり影 */
  margin-bottom: 20px;
}

/* 入力・セレクト・ボタン共通 */
.input-card input,
.input-card select,
.input-card button {
  display: block;
  width: 100%;            /* 横幅揃える */
  margin: 12px 0;
  padding: 16px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* 入力フォーカス時（触ってる感） */
input:focus,
select:focus {
  outline: none;
  border: 2px solid #a5d6a7;
}

/* セレクトの見た目統一（iPhone対策） */
select {
  appearance: none;
}


/* =========================
   メインボタン（追加）
========================= */
#mainBtn {
  background: #81c784;
  border: none;
  color: white;
  font-weight: bold;
  font-size: 20px;
  padding: 18px;
}


/* =========================
   精算結果
========================= */
.result-box {
  font-size: 32px;
  font-weight: bold;
  padding: 25px;
  margin: 20px 0;
  border-radius: 15px;
  text-align: center;
}
/* =========================
   精算結果レイアウト
========================= */

.result-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 22px;
  flex-wrap: nowrap;  /* ← 強制1行 */
}

/* アイコン＋名前セット */
.result-user {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 大きめアイコン */
.icon-result {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* 名前タグ */
.result-name {
  font-size: 12px;        /* 小さくする */
  margin-top: 3px;
  padding: 2px 6px;
  border-radius: 999px;
  background: #f1f8e9;
  white-space: nowrap;    /* ← 改行防止（超重要） */
}

/* 精算結果の金額（目立たせる＆改行防止） */
.result-amount {
  font-size: 26px;
  font-weight: bold;
  color: #e91e63;         /* 一覧と同じ赤 */
  white-space: nowrap;    /* ← 10万でも改行しない */
}

/* 矢印 */
.arrow {
  font-size: 26px;
  font-weight: bold;
}
/* =========================
   一覧（リスト）
========================= */

/* 各アイテムカード */
li {
  list-style: none;
  background: transparent;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  font-size: 18px;
   /* スワイプ感　*/
  transition: transform 0.25s ease;
  touch-action: pan-y;
  /* ゴミ箱アイコン　*/
  position: relative;
  overflow: hidden;
  display: block;
}

/* 上段（名前と金額） */
.item-top {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* メモ */
.memo {
  font-size: 14px;
  color: #666;
  margin-top: 3px;
}

/* ボタンエリア */
.buttons {
  margin-top: 10px;
}

/* 編集・削除ボタン */
.edit-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: #fff;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ゴミ箱（裏側） */
.swipe-bg {
  position: absolute;
  top: 0;
  right: 0;
  width: 100%;
  height: 100%;

  background: #ff5252;
  
  z-index: 1;

  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 20px;
  font-size: 22px;
}

/* 表側 */
.item-content {
  position: relative;
  z-index: 2;
  background: #fff;
  border-radius: 12px;
  transition: transform 0.25s ease;
  padding: 12px;
}
/* ボタン共通 */
button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
}

/* アイコン関連 */
.user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.tag {
  background: #f1f8e9;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 14px;
}

.name {
  font-weight: bold;
  font-size: 18px;
}

.amount {
  font-weight: bold;
  color: #e91e63;
}

/* =========================
   モーダル全体（背景）
========================= */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);

  justify-content: center;
  align-items: center;
  
  z-index: 9999;
}

body.modal-open {
  overflow: hidden;
}

/* =========================
   モーダル中身
========================= */
.modal-content {
  background: #fff9c4; /* ← 薄い黄色 */
  padding: 20px;
  border-radius: 15px;
  width: 90%;
  max-width: 400px;

  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  text-align: center;
  
  position: relative;
  z-index: 10000;
}

/* タイトル */
.modal-content h3 {
  margin-bottom: 15px;
}

/* 入力（縦並び） */
.modal-content select,
.modal-content input {
  width: 100%;
  margin: 10px 0;
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

/* =========================
   ボタンエリア（横並び）
========================= */
.modal-buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

/* ボタン共通 */
.modal-buttons button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  font-weight: bold;
}

/* キャンセル */
.cancel-btn {
  background: #e0e0e0;
}

/* 保存 */
.save-btn {
  background: #81c784;
  color: white;
}


</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h2>支出入力</h2>

<div class="input-card">

  <select id="payer">
    <option value="A">はるきが支払い</option>
    <option value="B">しゅりが支払い</option>
  </select>

  <input type="number" id="amount" placeholder="金額">

  <input type="text" id="memo" placeholder="メモ">

<button id="mainBtn" onclick="addOrUpdate()">追加</button>

</div>
<h2>精算結果</h2>
<button onclick="clearAll()" style="background:#ef9a9a; color:white; font-weight:bold;">
  リセット
</button>
<p id="result" class="result-box">まだデータがありません</p>
<h2>一覧</h2>
<ul id="list"></ul>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  updateDoc,
  deleteDoc,
  doc,
  onSnapshot,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyBTI1uXYabHYz1H4XtUv5lJ2xOEwkGQVAo",
  authDomain: "money-management-255cf.firebaseapp.com",
  projectId: "money-management-255cf",
};

// Firebase初期化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const expensesRef = collection(db, "expenses");

// 他のscriptから使えるようにwindowへ公開
window.db = db;
window.expensesRef = expensesRef;

// 表示用
let dataList = [];
let editId = null;

// アイコンの関数（上はるきくん、下しゅり）
function getIcon(payer) {
  return payer === "A"
    ? "https://i.imgur.com/AjnIVgE.jpg"
    : "https://i.imgur.com/k3uE2oU.jpg";
}

// 名前変換
function getName(payer) {
  return payer === "A" ? "はるき" : "しゅり";
}

// 金額で3桁区切りのカンマをつける処理
function formatMoney(num) {
  return num.toLocaleString();
}

// 🔥リアルタイム同期（超重要）
onSnapshot(expensesRef, (snapshot) => {
  dataList = snapshot.docs.map(d => ({
    id: d.id,
    ...d.data()
  }));

  // 一覧・精算結果を再描画
  render();
});

// 表示
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let totalA = 0;
  let totalB = 0;

  dataList.forEach((d) => {
    const li = document.createElement("li");

li.innerHTML = `
  <div class="item-content">
    <div class="item-top">
      <div class="user">
        <img src="${getIcon(d.payer)}" class="icon">
        <span class="tag">${getName(d.payer)}</span>
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <div class="amount">${formatMoney(d.amount)}円</div>
        <button class="edit-btn" onclick="editItem('${d.id}')">✏️</button>
      </div>
    </div>

    <div class="memo">${d.memo}</div>
  </div>

  <div class="swipe-bg">
    🗑️
  </div>
`;

    list.appendChild(li);
    addSwipeDelete(li, d.id);
    if (d.payer === "A") totalA += Number(d.amount);
else totalB += Number(d.amount);
  });

  // 割り勘計算（2人固定・四捨五入）
  const total = totalA + totalB;
  const half = Math.round(total / 2);

  const haruki = `
  <div class="result-user">
    <img src="${getIcon("A")}" class="icon-result">
    <div class="result-name">はるき</div>
  </div>
`;

const shuri = `
  <div class="result-user">
    <img src="${getIcon("B")}" class="icon-result">
    <div class="result-name">しゅり</div>
  </div>
`;

  let resultText = "";
  let color = "";

  if (total === 0) {
    resultText = "データがないよ";
    color = "#f5f5f5";

  } else if (totalA > half) {
    resultText = `
      <div class="result-line">
        ${shuri}
        <div class="arrow">→</div>
        <div class="result-amount">${formatMoney(totalA - half)}円</div>
        <div class="arrow">→</div>
        ${haruki}
      </div>
    `;
    color = "#ffdddd";

  } else if (totalB > half) {
    resultText = `
      <div class="result-line">
        ${haruki}
        <div class="arrow">→</div>
        <div class="result-amount">${formatMoney(totalB - half)}円</div>
        <div class="arrow">→</div>
        ${shuri}
      </div>
    `;
    color = "#ddddff";

  } else {
    resultText = "精算なし！";
    color = "#ddffdd";
  }

  // 計算結果表示エリア
  const resultEl = document.getElementById("result");
  resultEl.innerHTML = resultText;
  resultEl.style.backgroundColor = color;
}

// 追加 or 更新
window.addOrUpdate = async function () {
  try {
    const payer = document.getElementById("payer").value;
    const amount = Number(document.getElementById("amount").value);
    const memo = document.getElementById("memo").value;

    if (!amount) {
      alert("金額を入力してね");
      return;
    }

    const data = { payer, amount, memo };

    if (editId === null) {
      await addDoc(expensesRef, data);
    } else {
      await updateDoc(doc(db, "expenses", editId), data);
      editId = null;
    }

    // フォームリセット
    document.getElementById("amount").value = "";
    document.getElementById("memo").value = "";

  } catch (e) {
    alert("Firebaseエラー：" + e.message);
    console.log(e);
  }
};

// 編集
window.editItem = (id) => {
  console.log("edit押された", id);

  const d = dataList.find(item => item.id === id);
  if (!d) return alert("データ見つからない");

  editId = id;

  // モーダルに値を入れる（ここが本体）
  document.getElementById("editPayer").value = d.payer;
  document.getElementById("editAmount").value = d.amount;
  document.getElementById("editMemo").value = d.memo;

  // モーダル表示
  document.getElementById("editModal").style.display = "flex";
  document.body.classList.add("modal-open");
};

//編集したデータを保存する処理
window.saveEdit = async function () {
  const payer = document.getElementById("editPayer").value;
  const amount = Number(document.getElementById("editAmount").value);
  const memo = document.getElementById("editMemo").value;

  if (!editId) return alert("編集対象がありません");

  await updateDoc(doc(db, "expenses", editId), {
    payer,
    amount,
    memo
  });

  editId = null;
  
  document.getElementById("editModal").style.display = "none";
};

//編集ウィンドーが閉じる処理
window.closeModal = function () {
  document.getElementById("editModal").style.display = "none";
　document.body.classList.remove("modal-open");
};

// 削除
window.deleteItem = async function (id) {
  await deleteDoc(doc(db, "expenses", id));
};

//スワイプ削除
function addSwipeDelete(li, id) {
  let startX = 0;
  let currentX = 0;
  let isSwiping = false;
  let moved = false;

  const content = li.querySelector(".item-content");

  li.addEventListener("touchstart", (e) => {
    if (e.target.closest(".edit-btn")) return;

    startX = e.touches[0].clientX;
    isSwiping = false;
    moved = false;
  });

  li.addEventListener("touchmove", (e) => {
  if (e.target.closest(".edit-btn")) return;

  currentX = e.touches[0].clientX;
  const diff = currentX - startX;

  if (Math.abs(diff) > 15) {
    isSwiping = true;
    moved = true;
  }

  if (isSwiping && diff < 0) {
  content.style.transition = "none";
  content.style.transform = `translateX(${diff}px)`;
  content.style.opacity = diff < -80 ? "0.5" : "1";
  }
});

li.addEventListener("touchend", async () => {
  const diff = currentX - startX;

  if (!moved) return;

  content.style.transition = "0.25s";

  if (diff < -80) {
    content.style.transform = "translateX(-120%)";
    content.style.opacity = "0";

    setTimeout(async () => {
      await deleteItem(id);
    }, 200);

  } else {
    content.style.transform = "translateX(0)";
    content.style.opacity = "1";
  }
});
}

// 全削除
window.clearAll = async function () {
  if (!confirm("全部消す？")) return;

  const snapshot = await getDocs(expensesRef);
  snapshot.forEach(async (d) => {
    await deleteDoc(doc(db, "expenses", d.id));
  });
};
</script>
<script>
window.onerror = function(message) {
  alert("エラー発生： " + message);
};
</script>


<!-- 編集モーダル -->
<div id="editModal" class="modal">

  <div class="modal-content">

    <h3>編集</h3>

    <select id="editPayer">
      <option value="A">はるき</option>
      <option value="B">しゅり</option>
    </select>

    <input type="number" id="editAmount" placeholder="金額">
    <input type="text" id="editMemo" placeholder="メモ">

    <div class="modal-buttons">
      <button onclick="closeModal()" class="cancel-btn">キャンセル</button>
      <button onclick="saveEdit()" class="save-btn">保存</button>
    </div>

  </div>
</div>

</body>
</html>
