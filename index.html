<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title> money management </title>
<style>
/* =========================
   全体設定
========================= */

/* 幅ズレ防止（超重要） */
* {
  box-sizing: border-box;
}

/* 背景＆ベース文字サイズ */
body {
  font-family: sans-serif;
  padding: 20px;
  background: #e8f5e9; /* パステル黄緑 */
  font-size: 18px; /* 全体大きめ */
}


/* =========================
   見出し
========================= */
h2 {
  margin-top: 25px;
  font-size: 22px;
}


/* =========================
   入力カード
========================= */
.input-card {
  background: #ffffff;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1); /* ぷっくり影 */
  margin-bottom: 20px;
}

/* 入力・セレクト・ボタン共通 */
.input-card input,
.input-card select,
.input-card button {
  display: block;
  width: 100%;            /* 横幅揃える */
  margin: 12px 0;
  padding: 16px;
  font-size: 18px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

/* 入力フォーカス時（触ってる感） */
input:focus,
select:focus {
  outline: none;
  border: 2px solid #a5d6a7;
}

/* セレクトの見た目統一（iPhone対策） */
select {
  appearance: none;
}


/* =========================
   メインボタン（追加）
========================= */
#mainBtn {
  background: #81c784;
  border: none;
  color: white;
  font-weight: bold;
  font-size: 20px;
  padding: 18px;
}


/* =========================
   精算結果
========================= */
.result-box {
  font-size: 32px;
  font-weight: bold;
  padding: 25px;
  margin: 20px 0;
  border-radius: 15px;
  text-align: center;
}
/* =========================
   精算結果レイアウト
========================= */

.result-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  font-size: 22px;
  flex-wrap: nowrap;  /* ← 強制1行 */
}

/* アイコン＋名前セット */
.result-user {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 大きめアイコン */
.icon-result {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}

/* 名前タグ */
.result-name {
  font-size: 12px;        /* 小さくする */
  margin-top: 3px;
  padding: 2px 6px;
  border-radius: 999px;
  background: #f1f8e9;
  white-space: nowrap;    /* ← 改行防止（超重要） */
}

/* 精算結果の金額（目立たせる＆改行防止） */
.result-amount {
  font-size: 26px;
  font-weight: bold;
  color: #e91e63;         /* 一覧と同じ赤 */
  white-space: nowrap;    /* ← 10万でも改行しない */
}

/* 矢印 */
.arrow {
  font-size: 26px;
  font-weight: bold;
}
/* =========================
   一覧（リスト）
========================= */

/* 各アイテムカード */
li {
  list-style: none;
  background: #ffffff;
  padding: 18px;
  margin: 12px 0;
  border-radius: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.1);
  font-size: 18px;
}

/* 上段（名前と金額） */
.item-top {
  display: flex;
  justify-content: space-between;
  font-weight: bold;
}

/* メモ */
.memo {
  font-size: 14px;
  color: #666;
  margin-top: 5px;
}

/* ボタンエリア */
.buttons {
  margin-top: 10px;
}

/* 編集・削除ボタン */
.buttons button {
  margin-right: 5px;
}

/* ボタン共通 */
button {
  font-size: 16px;
  padding: 10px 14px;
  border-radius: 8px;
}

/* アイコン関連 */
.user {
  display: flex;
  align-items: center;
  gap: 10px;
}

.icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

.tag {
  background: #f1f8e9;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 14px;
}

.name {
  font-weight: bold;
  font-size: 18px;
}

.amount {
  font-weight: bold;
  color: #e91e63;
}


</style>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h2>支出入力</h2>

<div class="input-card">

  <select id="payer">
    <option value="A">はるきが支払い</option>
    <option value="B">しゅりが支払い</option>
  </select>

  <input type="number" id="amount" placeholder="金額">

  <input type="text" id="memo" placeholder="メモ">

  <button onclick="addOrUpdate()" id="mainBtn">追加</button>

</div>
<h2>精算結果</h2>
<p id="result" class="result-box">まだデータがありません</p>
<h2>一覧</h2>
<ul id="list"></ul>

<script>
let dataList = [];
let editIndex = null;

// アイコンの関数（上はるきくん、下しゅり）
function getIcon(payer) {
  return payer === "A"
    ? "https://i.imgur.com/AjnIVgE.jpg"
    : "https://i.imgur.com/k3uE2oU.jpg";
}

// 名前変換
function getName(payer) {
  return payer === "A" ? "はるき" : "しゅり";
}

// 追加 or 更新
function addOrUpdate() {
  const payer = document.getElementById("payer").value;
  const amount = Number(document.getElementById("amount").value);
  const memo = document.getElementById("memo").value;

  if (!amount) return alert("金額を入力してね");

  const data = { payer, amount, memo };

  if (editIndex !== null) {
    dataList[editIndex] = data;
    editIndex = null;

  } else {
    dataList.push(data);
  }

  save();
  render();
  resetForm();
}

// 表示
function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let totalA = 0;
  let totalB = 0;

  dataList.forEach((d, i) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div class="item-top">

        <div class="user">
          <img src="${getIcon(d.payer)}" class="icon">
          <span class="tag">${d.payer === "A" ? "はるき" : "しゅり"}</span>
        </div>

        <div class="amount">${d.amount}円</div>

      </div>

      <div class="memo">${d.memo}</div>

      <div class="buttons">
        <button onclick="editItem(${i})">編集</button>
        <button onclick="deleteItem(${i})">削除</button>
      </div>
    `;

    list.appendChild(li);

    if (d.payer === "A") totalA += d.amount;
    else totalB += d.amount;
  });

  // 割り勘計算（2人固定・四捨五入）
  // 割り勘計算（2人固定・四捨五入）
  const total = totalA + totalB;
  const half = Math.round(total / 2);

  const haruki = `
  <div class="result-user">
    <img src="${getIcon("A")}" class="icon-result">
    <div class="result-name">はるき</div>
  </div>
`;

const shuri = `
  <div class="result-user">
    <img src="${getIcon("B")}" class="icon-result">
    <div class="result-name">しゅり</div>
  </div>
`;

let resultText = "";
let color = "";

if (total === 0) {
  resultText = "まだデータがありません";
  color = "#f5f5f5";

} else if (totalA > half) {
  resultText = `
    <div class="result-line">
      ${shuri}
      <div class="arrow">→</div>
     <div class="result-amount">${totalA - half}円</div>
      <div class="arrow">→</div>
      ${haruki}
    </div>
  `;
  color = "#ffdddd";

} else if (totalB > half) {
  resultText = `
    <div class="result-line">
      ${haruki}
      <div class="arrow">→</div>
      <div class="result-amount">${totalB - half}円</div>
      <div class="arrow">→</div>
      ${shuri}
    </div>
  `;
  color = "#ddddff";

} else {
  resultText = "精算なし！";
  color = "#ddffdd";
}

//計算結果表示エリア
const resultEl = document.getElementById("result");
resultEl.innerHTML = resultText;
resultEl.style.backgroundColor = color;
}

// 編集
function editItem(index) {
  const d = dataList[index];

  document.getElementById("payer").value = d.payer;
  document.getElementById("amount").value = d.amount;
  document.getElementById("memo").value = d.memo;

  editIndex = index;

}

// 削除
function deleteItem(index) {
  dataList.splice(index, 1);
  save();
  render();
}

// 全削除
function clearAll() {
  if (!confirm("全部消す？")) return;
  dataList = [];
  save();
  render();
}

// 保存
function save() {
  localStorage.setItem("warikaData", JSON.stringify(dataList));
}

// 読み込み
function load() {
  dataList = JSON.parse(localStorage.getItem("warikaData")) || [];
  render();
}

// フォームリセット
function resetForm() {
  document.getElementById("amount").value = "";
  document.getElementById("memo").value = "";
}

// 初期化
load();

render();

</script>
</body>
</html>
